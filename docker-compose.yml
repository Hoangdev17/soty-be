      DATABASE_URL: mongodb+srv://hoangluudev17_db_user:2BrOmQKsN1tlRvj7@soty.xjhjgrw.mongodb.net/dev?retryWrites=true&w=majority&appName=soty

volumes:
  mongo_data:
